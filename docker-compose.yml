services:
  frontend:
    container_name: woxa_frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: http://woxa_backend:4000/api/v1
    networks:
      - woxa_network
    restart: unless-stopped

networks:
  woxa_network:
    external: true
